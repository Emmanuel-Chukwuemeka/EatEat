name: Deploy React App to InfinityFree

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: infinityfree-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy dist to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.ftp_server }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          port: 2124.18.0
          protocol: ftp
          local-dir: ./dist/
          server-dir: ${{ secrets.ftp_target_dir }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

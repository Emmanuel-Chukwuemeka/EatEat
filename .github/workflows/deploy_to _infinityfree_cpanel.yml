name: Deploy React App to InfinityFree

on:
	push:
		branches:
			- main
			

jobs:
	deploy:
		runs-on: ubuntu-latest

		steps:
			- name: Checkout repository
				uses: actions/checkout@v4

			- name: Setup Node.js
				uses: actions/setup-node@v4
				with:
					node-version: 24.18.0
					cache: npm

			- name: Install dependencies
				run: npm ci

			- name: Build app
				run: npm run build

			- name: Deploy dist to InfinityFree via FTP
				uses: SamKirkland/FTP-Deploy-Action@v4.3.5
				with:
					server: ${{ secrets.INFINITYFREE_FTP_SERVER }}
					username: ${{ secrets.INFINITYFREE_FTP_USERNAME }}
					password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
					port: 21
					protocol: ftp
					local-dir: ./dist/
					server-dir: ${{ secrets.INFINITYFREE_TARGET_DIR }}
					exclude: |
						**/.git*
						**/.git*/**
						**/node_modules/**
						.github/**
